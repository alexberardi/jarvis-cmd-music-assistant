name: "music"
display_name: "Music (Music Assistant)"
description: "Play and control music via Music Assistant. Search and play artists, albums, songs, playlists. Control playback, volume, shuffle, and repeat."
version: "1.0.0"
min_jarvis_version: "0.9.0"
license: "MIT"
author:
  github: "alexberardi"
categories: ["media", "music"]
platforms: ["darwin", "linux"]
keywords: ["music", "play", "song", "album", "artist", "playlist", "volume", "shuffle", "repeat", "music assistant"]

components:
  - type: command
    name: music
    path: commands/music/command.py

packages:
  - name: music-assistant-client
    version: ">=1.3.0"

apt_packages:
  - shairport-sync

secrets:
  - key: MUSIC_ASSISTANT_URL
    scope: integration
    value_type: string
    description: "Music Assistant WebSocket URL (e.g., ws://192.168.1.50:8095/ws)"
    is_sensitive: false
  - key: MUSIC_ASSISTANT_TOKEN
    scope: integration
    value_type: string
    description: "Music Assistant auth token"
  - key: MUSIC_ASSISTANT_PLAYER_ID
    scope: integration
    value_type: string
    description: "Default player ID (MAC address)"
    is_sensitive: false
